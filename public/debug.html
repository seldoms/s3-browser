<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S3 高级调试工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .content {
            padding: 30px;
        }

        .section {
            margin-bottom: 30px;
            padding: 20px;
            background: #f9f9f9;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            margin-right: 10px;
            margin-bottom: 10px;
            transition: all 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        button.secondary {
            background: white;
            color: #667eea;
            border: 2px solid #667eea;
        }

        button.danger {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        }

        pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 12px;
            line-height: 1.5;
            max-height: 400px;
            overflow-y: auto;
        }

        .status {
            padding: 12px 16px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-weight: 500;
            font-size: 14px;
        }

        .status.success {
            background: #d1fae5;
            color: #065f46;
            border: 1px solid #10b981;
        }

        .status.error {
            background: #fee;
            color: #c00;
            border: 1px solid #ef4444;
        }

        .status.info {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #3b82f6;
        }

        .status.warning {
            background: #fef3c7;
            color: #92400e;
            border: 1px solid #f59e0b;
        }

        .creds-display {
            background: #fff;
            padding: 15px;
            border-radius: 6px;
            border: 1px solid #e0e0e0;
            margin-top: 10px;
        }

        .creds-display div {
            margin-bottom: 8px;
            font-size: 13px;
        }

        .creds-display strong {
            display: inline-block;
            width: 150px;
            color: #666;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d0d0d0;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 10px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }

        .badge.success {
            background: #d1fae5;
            color: #065f46;
        }

        .badge.error {
            background: #fee;
            color: #c00;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🔍 S3 Browser 高级调试工具</h1>
            <p>诊断和解决连接问题</p>
        </div>

        <div class="content">
            <div class="section">
                <h2>📋 当前凭证信息</h2>
                <div id="credsInfo"></div>
            </div>

            <div class="section">
                <h2>🧪 自动诊断</h2>
                <button onclick="runFullDiagnostics()">🚀 运行完整诊断</button>
                <button onclick="testListBuckets()" class="secondary">测试获取桶列表</button>
                <button onclick="testConnection()" class="secondary">测试连接</button>
            </div>

            <div class="section">
                <h2>🪣 手动测试桶访问</h2>
                <p style="color: #666; font-size: 13px; margin-bottom: 10px;">
                    如果您知道桶的名称,可以直接测试访问:
                </p>
                <input type="text" id="bucketName" placeholder="输入桶名称,例如: my-bucket">
                <button onclick="testBucketAccess()">测试访问此桶</button>
                <button onclick="listBucketObjects()" class="secondary">列出桶内文件</button>
            </div>

            <div class="section">
                <h2>🔧 其他操作</h2>
                <button onclick="clearStorage()" class="danger">清除 localStorage</button>
                <button onclick="location.href='/'" class="secondary">返回登录页</button>
                <button onclick="location.href='/explorer'" class="secondary">返回 Explorer</button>
            </div>

            <div class="section">
                <h2>📊 诊断结果</h2>
                <div id="results"></div>
            </div>
        </div>
    </div>

    <script>
        let currentCreds = null;

        // 显示凭证信息
        function displayCreds() {
            const saved = localStorage.getItem("s3_creds");
            const credsDiv = document.getElementById('credsInfo');

            if (!saved) {
                credsDiv.innerHTML = '<div class="status error">❌ 未找到保存的凭证 - 请先登录</div>';
                return null;
            }

            try {
                const creds = JSON.parse(saved);
                currentCreds = creds;
                credsDiv.innerHTML = `
                    <div class="status success">✓ 找到保存的凭证</div>
                    <div class="creds-display">
                        <div><strong>Endpoint:</strong> ${creds.endpoint || '未设置'}</div>
                        <div><strong>Region:</strong> ${creds.region || '未设置'}</div>
                        <div><strong>Access Key ID:</strong> ${creds.accessKeyId ? creds.accessKeyId.substring(0, 10) + '...' : '未设置'}</div>
                        <div><strong>Secret Key:</strong> ${creds.secretAccessKey ? '***' + creds.secretAccessKey.substring(creds.secretAccessKey.length - 4) : '未设置'}</div>
                    </div>
                `;
                return creds;
            } catch (err) {
                credsDiv.innerHTML = `<div class="status error">❌ 凭证解析失败: ${err.message}</div>`;
                return null;
            }
        }

        // 运行完整诊断
        async function runFullDiagnostics() {
            const resultsDiv = document.getElementById('results');
            const creds = currentCreds || displayCreds();

            if (!creds) {
                resultsDiv.innerHTML = '<div class="status error">❌ 无法诊断:缺少凭证</div>';
                return;
            }

            resultsDiv.innerHTML = '<div class="status info">⏳ 正在运行完整诊断...</div>';

            let html = '<h3 style="margin-bottom: 15px;">诊断报告</h3>';
            let allPassed = true;

            // 测试 1: Endpoint 格式
            html += '<div style="margin-bottom: 20px;">';
            html += '<strong>1️⃣ Endpoint 格式检查</strong><br>';
            try {
                const url = new URL(creds.endpoint);
                html += `<span class="badge success">✓ 通过</span><br>`;
                html += `<small style="color: #666;">协议: ${url.protocol}, 主机: ${url.host}</small>`;
            } catch (err) {
                html += `<span class="badge error">✗ 失败</span><br>`;
                html += `<small style="color: #c00;">无效的 Endpoint: ${err.message}</small>`;
                allPassed = false;
            }
            html += '</div>';

            // 测试 2: Region 配置
            html += '<div style="margin-bottom: 20px;">';
            html += '<strong>2️⃣ Region 配置检查</strong><br>';
            if (!creds.region) {
                html += `<span class="badge error">✗ 失败</span><br>`;
                html += `<small style="color: #c00;">Region 未设置</small>`;
                allPassed = false;
            } else {
                html += `<span class="badge success">✓ 通过</span><br>`;
                html += `<small style="color: #666;">Region: ${creds.region}</small>`;
            }
            html += '</div>';

            // 测试 3: API 连接
            html += '<div style="margin-bottom: 20px;">';
            html += '<strong>3️⃣ API 连接测试</strong><br>';
            try {
                const startTime = Date.now();
                const response = await fetch('/api/s3', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        credentials: creds,
                        action: 'listBuckets',
                        params: {}
                    })
                });
                const duration = Date.now() - startTime;
                const data = await response.json();

                if (data.error) {
                    html += `<span class="badge error">✗ 失败</span><br>`;
                    html += `<small style="color: #c00;">API 错误: ${data.error}</small>`;
                    allPassed = false;
                } else {
                    html += `<span class="badge success">✓ 通过</span><br>`;
                    html += `<small style="color: #666;">连接成功 (${duration}ms), 找到 ${data.buckets ? data.buckets.length : 0} 个桶</small>`;

                    if (data.buckets && data.buckets.length > 0) {
                        html += '<br><br><strong>找到的存储桶:</strong><br>';
                        html += '<pre style="margin-top: 10px;">' + JSON.stringify(data.buckets, null, 2) + '</pre>';
                    }
                }
            } catch (err) {
                html += `<span class="badge error">✗ 失败</span><br>`;
                html += `<small style="color: #c00;">请求失败: ${err.message}</small>`;
                allPassed = false;
            }
            html += '</div>';

            // 总结
            html += '<div style="margin-top: 30px; padding: 15px; background: ' + (allPassed ? '#d1fae5' : '#fee') + '; border-radius: 6px;">';
            html += '<strong style="font-size: 16px;">' + (allPassed ? '✅ 所有测试通过!' : '⚠️ 发现问题') + '</strong><br>';
            if (!allPassed) {
                html += '<small>请根据上述失败的测试项进行修复</small>';
            } else {
                html += '<small>如果仍然看不到桶列表,可能是该账户下确实没有存储桶</small>';
            }
            html += '</div>';

            resultsDiv.innerHTML = html;
        }

        // 测试获取桶列表
        async function testListBuckets() {
            const resultsDiv = document.getElementById('results');
            const creds = currentCreds || displayCreds();

            if (!creds) {
                resultsDiv.innerHTML = '<div class="status error">❌ 无法测试:缺少凭证</div>';
                return;
            }

            resultsDiv.innerHTML = '<div class="status info">⏳ 正在获取桶列表...</div>';

            try {
                const startTime = Date.now();
                const response = await fetch('/api/s3', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        credentials: creds,
                        action: 'listBuckets',
                        params: {}
                    })
                });

                const duration = Date.now() - startTime;
                const data = await response.json();

                if (data.error) {
                    resultsDiv.innerHTML = `
                        <div class="status error">❌ API 返回错误</div>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                    return;
                }

                const bucketCount = data.buckets ? data.buckets.length : 0;

                if (bucketCount === 0) {
                    resultsDiv.innerHTML = `
                        <div class="status warning">⚠️ 未找到存储桶 (耗时: ${duration}ms)</div>
                        <div class="status info">
                            <strong>可能的原因:</strong><br>
                            1. 该账户下确实没有创建任何存储桶<br>
                            2. Region 配置错误,桶在其他区域<br>
                            3. 凭证权限不足,无法列出桶<br><br>
                            <strong>建议:</strong><br>
                            • 登录云服务商控制台确认是否有桶<br>
                            • 尝试在应用中创建一个测试桶<br>
                            • 如果知道桶名称,使用下方"手动测试桶访问"功能
                        </div>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    resultsDiv.innerHTML = `
                        <div class="status success">✓ 成功获取桶列表 (耗时: ${duration}ms)</div>
                        <div class="status info">找到 ${bucketCount} 个存储桶</div>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (err) {
                resultsDiv.innerHTML = `
                    <div class="status error">❌ 请求失败</div>
                    <pre>${err.message}\n${err.stack}</pre>
                `;
            }
        }

        // 测试桶访问
        async function testBucketAccess() {
            const bucketName = document.getElementById('bucketName').value.trim();
            const resultsDiv = document.getElementById('results');
            const creds = currentCreds || displayCreds();

            if (!creds) {
                resultsDiv.innerHTML = '<div class="status error">❌ 无法测试:缺少凭证</div>';
                return;
            }

            if (!bucketName) {
                resultsDiv.innerHTML = '<div class="status error">❌ 请输入桶名称</div>';
                return;
            }

            resultsDiv.innerHTML = `<div class="status info">⏳ 正在测试访问桶: ${bucketName}...</div>`;

            try {
                const response = await fetch('/api/s3', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        credentials: creds,
                        action: 'listObjects',
                        params: { bucket: bucketName, prefix: '' }
                    })
                });

                const data = await response.json();

                if (data.error) {
                    resultsDiv.innerHTML = `
                        <div class="status error">❌ 无法访问桶: ${bucketName}</div>
                        <div class="status warning">
                            <strong>错误信息:</strong> ${data.error}<br><br>
                            <strong>可能的原因:</strong><br>
                            • 桶不存在<br>
                            • 桶在不同的 Region<br>
                            • 没有访问权限
                        </div>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                } else {
                    const fileCount = data.contents ? data.contents.length : 0;
                    const folderCount = data.commonPrefixes ? data.commonPrefixes.length : 0;
                    resultsDiv.innerHTML = `
                        <div class="status success">✓ 成功访问桶: ${bucketName}</div>
                        <div class="status info">
                            找到 ${fileCount} 个文件, ${folderCount} 个文件夹
                        </div>
                        <pre>${JSON.stringify(data, null, 2)}</pre>
                    `;
                }
            } catch (err) {
                resultsDiv.innerHTML = `
                    <div class="status error">❌ 请求失败</div>
                    <pre>${err.message}</pre>
                `;
            }
        }

        // 列出桶内对象
        async function listBucketObjects() {
            await testBucketAccess();
        }

        // 测试连接
        async function testConnection() {
            await runFullDiagnostics();
        }

        // 清除存储
        function clearStorage() {
            if (confirm('确定要清除所有保存的凭证吗?')) {
                localStorage.removeItem('s3_creds');
                currentCreds = null;
                displayCreds();
                document.getElementById('results').innerHTML = '<div class="status success">✓ 已清除 localStorage</div>';
            }
        }

        // 页面加载时显示凭证
        displayCreds();
    </script>
</body>

</html>
